<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');
@import url('https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css');
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; width: 100%; font-family: 'DM Sans', sans-serif; background: #0a0a0a; overflow: hidden; }
.screen { width: 100%; height: 100%; background: #f9f9f7; display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; }
.status-bar { background: #0a0a0a; color: #fff; display: flex; justify-content: space-between; align-items: center; padding: 12px 22px 8px; font-size: 13px; font-weight: 500; }
.app-header { background: #0a0a0a; padding: 10px 22px 16px; display: flex; align-items: center; justify-content: space-between; }
.app-logo { font-size: 26px; font-weight: 600; color: #fff; letter-spacing: -0.03em; }
.app-logo span { color: #00c853; }
.header-sub { font-size: 11px; color: #666; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
.online-badge { background: #00c853; color: #fff; font-size: 12px; font-weight: 600; padding: 5px 13px; border-radius: 20px; letter-spacing: 0.04em; }

.map-area { height: 200px; position: relative; overflow: hidden; flex-shrink: 0; background: #e0e0dc; }
.map-area iframe { width: 100%; height: 100%; border: none; display: block; }
.map-overlay-label {
  position: absolute; bottom: 8px; left: 8px;
  background: rgba(10,10,10,0.75); color: #fff;
  font-size: 11px; font-weight: 500; padding: 4px 9px;
  border-radius: 6px; letter-spacing: 0.02em;
  backdrop-filter: blur(4px);
  max-width: 80%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.trip-card { background: #fff; padding: 16px 22px; border-bottom: 0.5px solid #eee; }
.trip-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.passenger-name { font-size: 22px; font-weight: 600; color: #0a0a0a; letter-spacing: -0.03em; }
.passenger-meta { font-size: 13px; color: #888; margin-top: 3px; }
.star-rating { display: flex; align-items: center; gap: 4px; font-size: 18px; font-weight: 500; color: #0a0a0a; }
.star { color: #f4b942; }
.trip-details { display: flex; flex-direction: column; gap: 7px; }
.trip-detail { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #444; }
.detail-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.dot-green { background: #00c853; }
.dot-red { background: #e53935; }

.earnings-bar { background: #0a0a0a; padding: 12px 22px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.earn-item { text-align: center; }
.earn-val { font-size: 18px; font-weight: 600; color: #fff; letter-spacing: -0.02em; }
.earn-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
.earn-divider { width: 0.5px; height: 32px; background: #333; }

.alerts-section { flex: 1; padding: 14px 22px; overflow-y: auto; background: #f9f9f7; }
.alerts-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.alerts-title { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.07em; }
.alert-count-badge { background: #e53935; color: #fff; font-size: 10px; font-weight: 700; min-width: 20px; height: 20px; border-radius: 10px; display: flex; align-items: center; justify-content: center; padding: 0 5px; }

.alert-item { background: #fff; border-radius: 14px; padding: 13px 16px; margin-bottom: 10px; border: 0.5px solid #eee; display: flex; gap: 12px; align-items: flex-start; }
.alert-item.new-alert { animation: flashIn 0.6s ease; }
@keyframes flashIn { 0% { background: #fffde7; border-color: #f4b942; transform: translateY(-4px); opacity: 0; } 100% { background: #fff; border-color: #eee; transform: translateY(0); opacity: 1; } }
.alert-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.alert-text { flex: 1; }
.alert-title-text { font-size: 15px; font-weight: 600; color: #0a0a0a; margin-bottom: 3px; }
.alert-body { font-size: 13px; color: #666; line-height: 1.4; }
.alert-time { font-size: 11px; color: #bbb; flex-shrink: 0; padding-top: 2px; }
.new-badge { display: inline-block; background: #e53935; color: #fff; font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 4px; margin-left: 5px; letter-spacing: 0.04em; vertical-align: middle; }

.bottom-nav { background: #fff; border-top: 0.5px solid #eee; display: flex; justify-content: space-around; padding: 12px 0 20px; flex-shrink: 0; }
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.nav-icon { font-size: 22px; color: #ccc; }
.nav-icon.active { color: #0a0a0a; }
.nav-label { font-size: 10px; color: #ccc; letter-spacing: 0.03em; }
.nav-label.active { color: #0a0a0a; font-weight: 600; }

.setup-overlay { position: fixed; inset: 0; background: #0a0a0a; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; z-index: 100; padding: 30px; text-align: center; }
.setup-overlay p { color: #666; font-size: 14px; line-height: 1.6; max-width: 280px; }
.setup-overlay a { color: #00c853; }
.setup-badge { background: #e53935; color: #fff; font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 20px; }
</style>
</head>
<body>

<div class="screen" id="app" style="display:none">
  <div class="status-bar">
    <span id="clock">9:41</span>
    <span>●●●</span>
  </div>
  <div class="app-header">
    <div>
      <div class="app-logo">Pick<span>Up</span></div>
      <div class="header-sub">Driver Mode</div>
    </div>
    <div class="online-badge">ONLINE</div>
  </div>

  <div class="map-area">
    <iframe id="map-frame"
      src=""
      allowfullscreen loading="lazy"
      referrerpolicy="no-referrer-when-downgrade">
    </iframe>
    <div class="map-overlay-label" id="map-label">Los Angeles, CA</div>
  </div>

  <div class="trip-card">
    <div class="trip-top">
      <div>
        <div class="passenger-name" id="pax-name">—</div>
        <div class="passenger-meta" id="pax-meta">Waiting for passenger info…</div>
      </div>
      <div class="star-rating"><span class="star">★</span><span id="pax-rating">—</span></div>
    </div>
    <div class="trip-details">
      <div class="trip-detail"><div class="detail-dot dot-green"></div><span id="pickup-addr">—</span></div>
      <div class="trip-detail"><div class="detail-dot dot-red"></div><span id="dropoff-addr">—</span></div>
    </div>
  </div>

  <div class="earnings-bar">
    <div class="earn-item"><div class="earn-val" id="earn-today">$0.00</div><div class="earn-label">Today</div></div>
    <div class="earn-divider"></div>
    <div class="earn-item"><div class="earn-val" id="trip-count">0</div><div class="earn-label">Trips</div></div>
    <div class="earn-divider"></div>
    <div class="earn-item"><div class="earn-val" id="driver-rating">4.88</div><div class="earn-label">Rating</div></div>
  </div>

  <div class="alerts-section">
    <div class="alerts-header">
      <span class="alerts-title">Alerts</span>
      <div class="alert-count-badge" id="alert-count">0</div>
    </div>
    <div id="alerts-list">
      <div style="font-size:13px;color:#bbb;text-align:center;padding:20px 0">Waiting for alerts…</div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item"><i class="ti ti-map-pin nav-icon active"></i><span class="nav-label active">Drive</span></div>
    <div class="nav-item"><i class="ti ti-chart-bar nav-icon"></i><span class="nav-label">Earnings</span></div>
    <div class="nav-item"><i class="ti ti-bell nav-icon"></i><span class="nav-label">Alerts</span></div>
    <div class="nav-item"><i class="ti ti-user nav-icon"></i><span class="nav-label">Profile</span></div>
  </div>
</div>

<div class="setup-overlay" id="setup-overlay">
  <div style="font-size:36px;color:#fff;font-family:'DM Sans',sans-serif;font-weight:600;letter-spacing:-0.03em">Pick<span style="color:#00c853">Up</span></div>
  <div class="setup-badge">PHONE SCREEN</div>
  <p id="setup-msg">Connecting to Firebase…</p>
  <p style="color:#444;font-size:12px">Make sure both devices are on the same network and Firebase is configured.</p>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
function updateClock() {
  const now = new Date(), h = now.getHours(), m = now.getMinutes();
  document.getElementById('clock').textContent = `${h%12||12}:${String(m).padStart(2,'0')}`;
}
updateClock(); setInterval(updateClock, 10000);

function updateMap(location) {
  if (!location) return;
  const key = GOOGLE_MAPS_KEY;
  const src = `https://www.google.com/maps/embed/v1/place?key=${key}&q=${encodeURIComponent(location)}&zoom=15&maptype=roadmap`;
  document.getElementById('map-frame').src = src;
  document.getElementById('map-label').textContent = location;
}

const fbConfigured = FIREBASE_CONFIG.apiKey !== 'PASTE_YOUR_FIREBASE_API_KEY_HERE';

if (!fbConfigured) {
  document.getElementById('setup-msg').innerHTML = 'Firebase not configured.<br><a href="https://console.firebase.google.com" target="_blank">console.firebase.google.com →</a>';
} else {
  firebase.initializeApp(FIREBASE_CONFIG);
  const db = firebase.database();

  // Set default map
  if (GOOGLE_MAPS_KEY !== 'PASTE_YOUR_GOOGLE_MAPS_KEY_HERE') {
    updateMap('Downtown Los Angeles, CA');
  }

  db.ref('.info/connected').on('value', snap => {
    if (snap.val()) {
      document.getElementById('setup-overlay').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
    }
  });

  db.ref('passenger').on('value', snap => {
    const d = snap.val(); if (!d) return;
    if (d.name)    document.getElementById('pax-name').textContent    = d.name;
    if (d.rating)  document.getElementById('pax-rating').textContent  = d.rating;
    if (d.meta)    document.getElementById('pax-meta').textContent    = d.meta;
    if (d.pickup)  document.getElementById('pickup-addr').textContent  = d.pickup;
    if (d.dropoff) document.getElementById('dropoff-addr').textContent = d.dropoff;
  });

  db.ref('earnings').on('value', snap => {
    const d = snap.val(); if (!d) return;
    if (d.today)  document.getElementById('earn-today').textContent     = d.today;
    if (d.trips)  document.getElementById('trip-count').textContent     = d.trips;
    if (d.rating) document.getElementById('driver-rating').textContent  = d.rating;
  });

  // Listen for map location updates
  db.ref('mapLocation').on('value', snap => {
    const loc = snap.val();
    if (loc && GOOGLE_MAPS_KEY !== 'PASTE_YOUR_GOOGLE_MAPS_KEY_HERE') updateMap(loc);
  });

  let knownKeys = new Set();
  db.ref('alerts').on('value', snap => {
    const data = snap.val();
    const list = document.getElementById('alerts-list');
    if (!data) {
      list.innerHTML = '<div style="font-size:13px;color:#bbb;text-align:center;padding:20px 0">No active alerts</div>';
      document.getElementById('alert-count').textContent = '0';
      knownKeys = new Set(); return;
    }
    const entries = Object.entries(data).sort((a,b) => (b[1].ts||0)-(a[1].ts||0));
    document.getElementById('alert-count').textContent = entries.length;
    list.innerHTML = '';
    entries.forEach(([key, alert]) => {
      const isNew = !knownKeys.has(key);
      const item = document.createElement('div');
      item.className = 'alert-item' + (isNew ? ' new-alert' : '');
      item.innerHTML = `
        <div class="alert-icon" style="background:${alert.iconBg};font-size:20px">${alert.emoji}</div>
        <div class="alert-text">
          <div class="alert-title-text">${alert.title}${isNew?'<span class="new-badge">NEW</span>':''}</div>
          <div class="alert-body">${alert.body}</div>
        </div>
        <div class="alert-time">${alert.time||'Now'}</div>
      `;
      list.appendChild(item);
      knownKeys.add(key);
    });
  });
}
</script>
</body>
</html>
